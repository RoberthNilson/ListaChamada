<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Chamada - Iema Pleno Carolina</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- Tela de Login -->
        <div id="loginScreen" class="screen active">
            <div class="login-box">
                <div class="logo">
                    <h1>Teste Iema Pleno Carolina</h1>
                    <p>Sistema de Chamada</p>
                </div>
                <form id="loginForm">
                    <div class="input-group">
                        <label for="username">Usuário</label>
                        <input type="text" id="username" required placeholder="Digite seu usuário">
                    </div>
                    <div class="input-group">
                        <label for="password">Senha</label>
                        <input type="password" id="password" required placeholder="Digite sua senha">
                    </div>
                    <button type="submit" class="btn-login">Entrar</button>
                </form>
                <div id="loginError" class="error-message"></div>
            </div>
        </div>

        <!-- Tela Principal do Sistema -->
        <div id="mainScreen" class="screen">
            <div class="header">
                <h2 id="salaTitle">Sistema de Chamada</h2>
                <div class="user-info">
                    <span id="userName"></span>
                    <span id="userCargo"></span>
                    <button id="logoutBtn" class="btn-logout">Sair</button>
                </div>
            </div>

            <div class="content">
                <div class="chamada-section">
                    <div class="section-header">
                        <h3>Lista de Alunos</h3>
                        <div class="chamada-controls">
                            <input type="date" id="dataChamada">
                        </div>
                    </div>
                    
                    <div class="alunos-list" id="alunosList">
                        <!-- Lista de alunos será inserida aqui -->
                    </div>
                </div>

                <div class="relatorio-section">
                    <div class="section-header">
                        <h3>Registro de Faltas</h3>
                        <div style="display: flex; gap: 10px; width: 100%; flex-wrap: wrap;">
                            <button id="visualizarRelatorioBtn" class="btn-primary" style="flex: 1; min-width: 120px;">👁️ Visualizar</button>
                            <button id="gerarRelatorioBtn" class="btn-secondary" style="flex: 1; min-width: 120px;">📊 Excel</button>
                        </div>
                    </div>
                    <div id="relatorioContent"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
