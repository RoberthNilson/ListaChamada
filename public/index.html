<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Chamada - Iema Pleno Carolina</title>
</head>
<body>
    <div class="container">
        <!-- Tela de Login -->
        <div id="loginScreen" class="screen active">
            <div class="login-box">
                <div class="logo">
                    <h1>Iema Pleno Carolina</h1>
                    <p>Sistema de Chamada</p>
                </div>
                <form id="loginForm">
                    <div class="input-group">
                        <label for="username">Usuário</label>
                        <input type="text" id="username" required placeholder="Digite seu usuário">
                    </div>
                    <div class="input-group">
                        <label for="password">Senha</label>
                        <input type="password" id="password" required placeholder="Digite sua senha">
                    </div>
                    <button type="submit" class="btn-login">Entrar</button>
                </form>
                <div id="loginError" class="error-message"></div>
            </div>
        </div>

        <!-- Tela de Administração -->
        <div id="adminScreen" class="screen">
            <div class="header">
                <h2>Área de Administração</h2>
                <div class="user-info">
                    <span id="userNameAdmin"></span>
                    <span id="userCargoAdmin"></span>
                    <button id="logoutBtnAdmin" class="btn-logout">Sair</button>
                </div>
            </div>

            <div class="content admin-content">
                <!-- Notificações de relatórios recebidos -->
                <div class="admin-section">
                    <div class="section-header">
                        <h3>📬 Relatórios Recebidos</h3>
                    </div>
                    <div id="adminNotificacoes"></div>
                </div>

                <div class="admin-section">
                    <div class="section-header">
                        <h3>Cadastro de Sala e Usuários</h3>
                    </div>
                    <div class="admin-grid">
                        <div class="input-group">
                            <label for="adminSalaId">ID da Sala</label>
                            <input type="text" id="adminSalaId" placeholder="ex: sala1" required>
                        </div>
                        <div class="input-group">
                            <label for="adminSalaNome">Nome da Sala</label>
                            <input type="text" id="adminSalaNome" placeholder="Ex: 1º Ano A" required>
                        </div>
                        <div class="input-group">
                            <label for="adminLider">Presidente / Líder</label>
                            <input type="text" id="adminLider" placeholder="Usuário do presidente" required>
                        </div>
                        <div class="input-group">
                            <label for="adminLiderSenha">Senha do Presidente</label>
                            <input type="password" id="adminLiderSenha" placeholder="Senha do presidente" required>
                        </div>
                        <div class="input-group">
                            <label for="adminViceLider">Vice-Presidente / Vice</label>
                            <input type="text" id="adminViceLider" placeholder="Usuário do vice" required>
                        </div>
                        <div class="input-group">
                            <label for="adminViceLiderSenha">Senha do Vice</label>
                            <input type="password" id="adminViceLiderSenha" placeholder="Senha do vice" required>
                        </div>
                        <div class="input-group">
                            <label for="adminSecretario">Secretário</label>
                            <input type="text" id="adminSecretario" placeholder="Usuário do secretário" required>
                        </div>
                        <div class="input-group">
                            <label for="adminSecretarioSenha">Senha do Secretário</label>
                            <input type="password" id="adminSecretarioSenha" placeholder="Senha do secretário" required>
                        </div>
                    </div>
                    <button id="adminCriarSalaBtn" class="btn-primary">Criar / Atualizar Sala</button>
                    <div id="adminSalaMessage" class="error-message"></div>
                </div>

                <div class="admin-section">
                    <div class="section-header">
                        <h3>Adicionar Alunos</h3>
                    </div>
                    <div class="admin-grid">
                        <div class="input-group">
                            <label for="adminAlunoSala">Sala</label>
                            <select id="adminAlunoSala"></select>
                        </div>
                        <div class="input-group full-width">
                            <label for="adminAlunosLista">Lista de Alunos (um por linha)</label>
                            <textarea id="adminAlunosLista" rows="4" placeholder="Nome do aluno 1&#10;Nome do aluno 2&#10;Nome do aluno 3"></textarea>
                        </div>
                    </div>
                    <button id="adminAdicionarAlunoBtn" class="btn-primary">Adicionar Alunos</button>
                    <div id="adminAlunoMessage" class="error-message"></div>
                </div>

                <div class="admin-section">
                    <div class="section-header">
                        <h3>Salas Cadastradas</h3>
                    </div>
                    <div id="adminSalasList"></div>
                </div>

                <div class="admin-section">
                    <div class="section-header">
                        <h3>Deletar Sala</h3>
                    </div>
                    <div class="admin-grid">
                        <div class="input-group">
                            <label for="adminDeletarSala">Sala</label>
                            <select id="adminDeletarSala"></select>
                        </div>
                    </div>
                    <button id="adminDeletarSalaBtn" class="btn-danger">Deletar Sala</button>
                    <div id="adminDeletarMessage" class="error-message"></div>
                </div>
            </div>
        </div>

        <!-- Tela Principal do Sistema -->
        <div id="mainScreen" class="screen">
            <div class="header">
                <h2 id="salaTitle">Sistema de Chamada</h2>
                <div class="user-info">
                    <span id="userName"></span>
                    <span id="userCargo"></span>
                    <button id="logoutBtn" class="btn-logout">Sair</button>
                </div>
            </div>

            <div class="content">
                <div class="chamada-section">
                    <div class="section-header">
                        <h3>Lista de Alunos</h3>
                        <div class="chamada-controls">
                            <input type="date" id="dataChamada">
                        </div>
                    </div>
                    
                    <div class="alunos-list" id="alunosList">
                        <!-- Lista de alunos será inserida aqui -->
                    </div>
                </div>

                <div class="relatorio-section">
                    <div class="section-header">
                        <h3>Registro de Faltas</h3>
                        <button id="gerarRelatorioBtn" class="btn-secondary">📤 Enviar Relatório ao Admin</button>
                    </div>
                    <div id="relatorioContent"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
